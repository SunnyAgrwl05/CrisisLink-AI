<svg viewBox="0 0 900 1000" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
  <style>
    .box { fill:#eef4ff; stroke:#2b5cb8; stroke-width:2; rx:10; }
    .code { fill:#fff3e0; stroke:#b8722b; stroke-width:2; rx:10; }
    .human { fill:#ffe9ec; stroke:#c62839; stroke-width:2; rx:10; }
    .label { font-size:15px; fill:#111; text-anchor:middle; }
    .sub { font-size:11px; fill:#555; text-anchor:middle; }
    .edge { stroke:#333; stroke-width:2; fill:none; marker-end:url(#arrow); }
  </style>

  <text x="450" y="30" text-anchor="middle" font-size="22" font-weight="bold">CrisisLink AI — Multi-Agent Workflow Graph</text>

  <rect x="380" y="55" width="140" height="40" class="box"/>
  <text x="450" y="80" class="label">Citizen Report</text>

  <rect x="330" y="130" width="240" height="55" class="box"/>
  <text x="450" y="153" class="label">Emergency Orchestrator</text>
  <text x="450" y="170" class="sub">(uses AgentTool: triage_advisor)</text>

  <rect x="150" y="220" width="220" height="50" class="box"/>
  <text x="260" y="250" class="label">SOS Verification Agent</text>

  <rect x="530" y="220" width="220" height="50" class="box"/>
  <text x="640" y="250" class="label">Damage Assessment Agent</text>

  <rect x="330" y="305" width="240" height="50" class="box"/>
  <text x="450" y="335" class="label">Priority Agent</text>

  <rect x="90" y="390" width="220" height="50" class="box"/>
  <text x="200" y="420" class="label">Resource Allocation Agent</text>

  <rect x="340" y="390" width="220" height="50" class="box"/>
  <text x="450" y="420" class="label">Shelter Recommendation Agent</text>

  <rect x="590" y="390" width="220" height="50" class="box"/>
  <text x="700" y="420" class="label">Medical Assistance Agent</text>

  <rect x="330" y="475" width="240" height="50" class="code"/>
  <text x="450" y="500" class="label">Security Checkpoint</text>
  <text x="450" y="516" class="sub">PII mask · injection scan · audit log</text>

  <rect x="330" y="555" width="240" height="55" class="human"/>
  <text x="450" y="578" class="label">Human Approval Agent</text>
  <text x="450" y="595" class="sub">HITL gate for CRITICAL plans</text>

  <rect x="330" y="640" width="240" height="50" class="box"/>
  <text x="450" y="670" class="label">Communication Agent</text>

  <rect x="380" y="720" width="140" height="40" class="box"/>
  <text x="450" y="745" class="label">Final Response</text>

  <rect x="60" y="800" width="780" height="150" fill="#f5f5f5" stroke="#999" stroke-width="1.5" rx="10"/>
  <text x="450" y="825" text-anchor="middle" font-size="14" font-weight="bold">MCP Server (mcp_server.py)</text>
  <text x="150" y="855" class="sub">Weather Tool</text>
  <text x="290" y="855" class="sub">Shelter Tool</text>
  <text x="430" y="855" class="sub">Hospital Tool</text>
  <text x="570" y="855" class="sub">Maps Tool</text>
  <text x="710" y="855" class="sub">Resource Inventory Tool</text>
  <text x="430" y="880" class="sub">Emergency Contact Tool</text>
  <text x="450" y="915" text-anchor="middle" font-size="12" fill="#555">Connected via McpToolset (stdio) from: Damage, Priority, Resource, Shelter, Medical agents</text>

  <!-- edges -->
  <path class="edge" d="M450,95 L450,128"/>
  <path class="edge" d="M400,185 L280,218"/>
  <path class="edge" d="M500,185 L620,218"/>
  <path class="edge" d="M260,270 L420,303"/>
  <path class="edge" d="M640,270 L480,303"/>
  <path class="edge" d="M400,355 L200,388"/>
  <path class="edge" d="M450,355 L450,388"/>
  <path class="edge" d="M500,355 L700,388"/>
  <path class="edge" d="M200,440 L400,473"/>
  <path class="edge" d="M450,440 L450,473"/>
  <path class="edge" d="M700,440 L500,473"/>
  <path class="edge" d="M450,525 L450,553"/>
  <path class="edge" d="M450,610 L450,638"/>
  <path class="edge" d="M450,690 L450,718"/>
</svg>
